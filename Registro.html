<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tropical Travel - Registro</title>
        <link rel="stylesheet" href="Css/LoginInicio.css">
        <link rel="icon" href="Imagenes/Icon_tropicals_T.png" type="image/png">
        <link rel="apple-touch-icon" href="Imagenes/Icon_tropicals_T.png">
        
</head>
<body>
    <div class="login-container">
        <aside class="centerbar" aria-label="Formulario de registro">
            <div class="logo-section">
                <h1>Tropical Travel </h1>
                <p>Crea tu cuenta para explorar</p>
            </div>
            <main>
                <form id="registroForm" aria-label="Formulario de registro">
                    <h2>Regístrate en Tropical Travel</h2>
                    <div class="form-group">
                        <label for="nuevo-username">Nombre de usuario:</label>
                        <input type="text" id="nuevo-username" name="nuevo-username" required placeholder="Ingrese un nombre de usuario">
                    </div>
                    <div class="form-group">
                        <label for="email">Correo electrónico:</label>
                        <input type="email" id="email" name="email" required placeholder="Ingrese un correo electrónico">
                    </div>
                    <div class="form-group">
                        <label for="nueva-password">Contraseña:</label>
                        <input type="password" id="nueva-password" name="nueva-password" required placeholder="Ingrese una contraseña (mínimo 6 caracteres)">
                    </div>
                    <div class="form-group">
                        <label for="nueva-password-confir">Confirme su Contraseña:</label>
                        <input type="password" id="nueva-password-confir" name="nueva-password-confir" required placeholder="Confirme su contraseña">
                    </div>
                    <div class="form-group">
                        <label for="reg-telefono">Teléfono:</label>
                        <input type="tel" id="reg-telefono" name="reg-telefono" placeholder="Ej: +57 300 123 4567">
                    </div>
                    <div class="form-group">
                        <label for="reg-pais">País:</label>
                        <select id="reg-pais" name="reg-pais">
                            <option value="Colombia">Colombia</option>
                            <option value="México">México</option>
                            <option value="Argentina">Argentina</option>
                            <option value="Chile">Chile</option>
                            <option value="Perú">Perú</option>
                            <option value="Ecuador">Ecuador</option>
                            <option value="Venezuela">Venezuela</option>
                            <option value="España">España</option>
                            <option value="Estados Unidos">Estados Unidos</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="reg-ciudad">Ciudad:</label>
                        <input type="text" id="reg-ciudad" name="reg-ciudad" placeholder="Ingrese su ciudad">
                    </div>
                    <div class="form-group">
                        <label for="reg-fechanac">Fecha de Nacimiento:</label>
                        <input type="date" id="reg-fechanac" name="reg-fechanac">
                    </div>
                    <button type="submit" class="btn-submit">Registrarse</button>
                    <div class="login-section">
                        <p>¿Ya tienes una cuenta?</p>
                        <a href="index.html" class="btn-signup">Inicia sesión aquí</a>
                    </div>
                </form>
            </main>
        </aside>
    </div>
    <script src="Scripts/ScriptsReg.js" defer></script>
</body>
</html>
