<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tropical Travel - IA Chat</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../Css/ClienteStyle.css">
    <link rel="stylesheet" href="../Css/IAChat.css">

    <!-- ICONO -->
    <link rel="icon" href="../Imagenes/Icon_tropicals_T.png">
</head>

<body>

<!-- HEADER -->
<header class="top-header">
    <div class="header-container">

        <div class="logo-section" onclick="window.location.href='Inicio.html'">
            <div class="logo-icon" style="background-image: url('../Imagenes/Icon_tropicals_T.png');"></div>
            <span class="logo-text">Tropical Travel</span>
        </div>

        <nav class="top-nav">
            <button class="nav-btn" onclick="window.location.href='Explorar.html'"><img class="nav-btn-icon" src="../Imagenes/Botones_Iconos/Explorar.png" alt="" aria-hidden="true"><span>Explorar</span></button>
            <button class="nav-btn" onclick="window.location.href='MisViajes.html'"><img class="nav-btn-icon" src="../Imagenes/Botones_Iconos/MisViajes.png" alt="" aria-hidden="true"><span>Mis Viajes</span></button>
            <button class="nav-btn" onclick="window.location.href='Comunidad.html'"><img class="nav-btn-icon" src="../Imagenes/Botones_Iconos/Comunidad.png" alt="" aria-hidden="true"><span>Comunidad</span></button>
            <button class="btn-iachat active"><img class="nav-btn-icon" src="../Imagenes/Botones_Iconos/ChatBot.png" alt="" aria-hidden="true"><span>IA Chat</span></button>
        </nav>

        <div class="header-actions">
            <div class="notification-wrapper">
                <button class="notification-btn" id="notificationBtn">🔔</button>
                <div class="notification-badge" id="notificationBadge">3</div>
            </div>
            <div class="user-avatar" id="userInitials" onclick="window.location.href='Perfil.html'" title="Mi perfil">US</div>
        </div>

    </div>
</header>

<!-- CHAT -->
<section class="chat-section">
    <div class="chat-container">

        <div class="chat-main">

            <!-- BARRA SUPERIOR -->
            <div class="chat-header">
                <span>LawMoon Assistance</span>
            </div>

            <!-- MENSAJES (SIN MENSAJE HARDCODEADO) -->
            <div class="chat-messages" id="chatMessages">
                <!-- VACÍO: el JS pone el mensaje inicial -->
            </div>

            <!-- INPUT -->
            <div class="chat-input-area">

                <input 
                    type="text" 
                    class="chat-input" 
                    id="chatInput"
                    placeholder="Escribe tu mensaje..."
                    autocomplete="off"
                >

                <button class="btn-send" id="sendBtn" type="button">
                    Enviar
                </button>

            </div>

        </div>
    </div>
</section>

<!-- SCRIPTS -->
<script src="../Scripts/ScriptsIAChat.js"></script>
<script src="../Scripts/ScriptsNotificacion.js"></script>

</body>
</html>
