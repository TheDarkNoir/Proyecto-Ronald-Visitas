<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Viajes</title>

    <!-- ESTILOS -->
    <link rel="stylesheet" href="../Css/ClienteStyle.css">
    <link rel="stylesheet" href="../Css/MisViajes.css">

    <!-- ICONOS -->
    <link rel="icon" href="../Imagenes/Icon_tropicals_T.png" type="image/png">
    <link rel="apple-touch-icon" href="../Imagenes/Icon_tropicals_T.png">
</head>

<body>

    <!-- HEADER -->
    <header class="top-header">
        <div class="header-container">

            <!-- LOGO -->
            <div class="logo-section" style="cursor:pointer;" onclick="location.href='Inicio.html';" title="Volver a Inicio">
                <div class="logo-icon" style="background-image: url('../Imagenes/Icon_tropicals_T.png');"></div>
                <span class="logo-text">Tropical Travel</span>
            </div>

            <!-- NAV -->
            <nav class="top-nav">
                <button class="nav-btn image-button-only" onclick="location.href='Explorar.html'" aria-label="Explorar" title="Explorar"><img class="nav-btn-icon" src="../Imagenes/Botones_Iconos/Explorar.png" alt="" aria-hidden="true"></button>
                <button class="nav-btn image-button-only active" onclick="location.href='MisViajes.html'" aria-label="Mis Viajes" title="Mis Viajes"><img class="nav-btn-icon" src="../Imagenes/Botones_Iconos/MisViajes.png" alt="" aria-hidden="true"></button>
                <button class="nav-btn image-button-only" onclick="location.href='Comunidad.html'" aria-label="Comunidad" title="Comunidad"><img class="nav-btn-icon" src="../Imagenes/Botones_Iconos/Comunidad.png" alt="" aria-hidden="true"></button>
                <button class="btn-iachat image-button-only" onclick="location.href='IAChat.html'" aria-label="IA Chat" title="IA Chat"><img class="nav-btn-icon" src="../Imagenes/Botones_Iconos/ChatBot.png" alt="" aria-hidden="true"></button>
            </nav>

            <!-- ACCIONES -->
            <div class="header-actions">
                <div class="user-avatar" id="userInitials" onclick="location.href='Perfil.html'" title="Mi perfil">
                    JA
                </div>
            </div>

        </div>
    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="my-trips">

        <section class="trips-header">
            <h1>Mis Viajes</h1>
            <p class="subtitle">Gestiona tus aventuras y reservas activas</p>
        </section>

        <section class="trip-filters">
            <button class="filter-btn active" data-status="all">Todos</button>
            <button class="filter-btn" data-status="confirmed">Confirmados</button>
            <button class="filter-btn" data-status="pending">Pendientes</button>
            <button class="filter-btn" data-status="cancelled">Cancelados</button>
        </section>

        <section class="trips-grid" id="tripsGrid">
            <!-- Tarjetas generadas por JS -->
        </section>

    </main>

    <!-- MODAL DETALLE -->
    <div class="modal" id="tripModal" aria-hidden="true">
        <div class="modal-content">
            <button class="close-modal" id="closeModal">×</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- BOTÓN FLOTANTE -->
    <button class="floating-help">?</button>

    <!-- SCRIPTS -->
    <script src="../Scripts/ScriptsFichasViaje.js" defer></script>
    <!-- <script src="../Scripts/MisViajes.js" defer></script> -->

</body>
</html>
