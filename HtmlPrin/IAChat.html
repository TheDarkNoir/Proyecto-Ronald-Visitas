<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tropical Travel - IA Chat</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../Css/ClienteStyle.css">
    <link rel="stylesheet" href="../Css/IAChat.css">

    <!-- ICONO -->
    <link rel="icon" href="../Imagenes/Icon_tropicals_T.png">
</head>

<body>

<!-- HEADER -->
<header class="top-header">
    <div class="header-container">

        <div class="logo-section" onclick="window.location.href='Inicio.html'">
            <div class="logo-icon" style="background-image: url('../Imagenes/Icon_tropicals_T.png');"></div>
            <span class="logo-text">Tropical Travel</span>
        </div>

        <nav class="top-nav">
            <button class="nav-btn" onclick="window.location.href='Explorar.html'">🧭 Explorar</button>
            <button class="nav-btn" onclick="window.location.href='MisViajes.html'">📅 Mis Viajes</button>
            <button class="nav-btn" onclick="window.location.href='Comunidad.html'">👥 Comunidad</button>
            <button class="btn-iachat active">💬 IA Chat</button>
        </nav>

        <div class="header-actions">
            <button class="notification-btn" id="notificationBtn">🔔</button>
            <div class="notification-badge" id="notificationBadge">3</div>
            <div class="user-avatar" id="userInitials">US</div>
        </div>

    </div>
</header>

<!-- CHAT -->
<section class="chat-section">
    <div class="chat-container">

        <div class="chat-main">

            <!-- MENSAJES -->
            <div class="chat-messages" id="chatMessages">

                <div class="message ai-message">
                    <div class="message-avatar">🤖</div>
                    <div class="message-content">
                        <p>Bienvenido a Tropical Travel 🌴</p>
                    </div>
                </div>

            </div>

            <!-- INPUT -->
            <div class="chat-input-area">

                <input 
                    type="text" 
                    class="chat-input" 
                    id="chatInput"
                    placeholder="Escribe tu mensaje..."
                    autocomplete="off"
                >

                <button class="btn-send" id="sendBtn" type="button">
                    Enviar
                </button>

            </div>

        </div>
    </div>
</section>

<!-- SCRIPTS -->
<script src="../Scripts/ScriptsIAChat.js"></script>
<script src="../Scripts/ScriptsNotificacion.js"></script>

</body>
</html>
