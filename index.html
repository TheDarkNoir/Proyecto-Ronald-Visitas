<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tropical Travel - Inicio de Sesión</title>
    <link rel="stylesheet" href="Css/EstiloInicio.css">
</head>
<body>
    <div class="login-container">
        <aside class="centerbar" aria-label="Formulario de inicio de sesión">
            <div class="logo-section">
                <h1>🌴 Tropical Travel</h1>
                <p>Descubre los mejores destinos turísticos</p>
            </div>
            <main>
                <form id="loginForm" aria-label="Formulario de inicio de sesión">
                    <h2>Bienvenido a Tropical Travel</h2>
                    <div class="form-group">
                        <label for="username">Correo electrónico:</label>
                        <input type="email" id="username" name="username" required placeholder="Ingrese su correo electrónico">
                    </div>
                    <div class="form-group">
                        <label for="Contrasena">Contraseña:</label>
                        <input type="password" id="Contrasena" name="Contrasena" required placeholder="Ingrese su contraseña">
                    </div>
                    <button type="submit" class="btn-submit">Iniciar sesión</button>
                    <div class="signup-section">
                        <p>¿No tienes una cuenta?</p>
                        <a href="Registro.html" class="btn-signup">Regístrate aquí</a>
                    </div>
                </form>
            </main>
        </aside>
    </div>
    <script src="Scripts/ScriptsLogin.js" defer></script>
</body>
</html>
