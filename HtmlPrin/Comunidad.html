<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tropical Travel - Comunidad</title>
    <link rel="stylesheet" href="../Css/ClienteStyle.css?v=20260407-3">
    <link rel="stylesheet" href="../Css/Comunidad.css?v=20260407-3">
    <link rel="icon" href="../Imagenes/Icon_tropicals_T.png" type="image/png">
    <link rel="apple-touch-icon" href="../Imagenes/Icon_tropicals_T.png">
</head>
<body>
    <!-- HEADER SUPERIOR -->
    <header class="top-header">
        <div class="header-container">
            <div class="logo-section" style="cursor:pointer;" onclick="location.href='Inicio.html';" title="Volver a Inicio">
                <div class="logo-icon" style="background-image: url('../Imagenes/Icon_tropicals_T.png');"></div>
                <span class="logo-text">Tropical Travel</span>
            </div>
            <nav class="top-nav">
                <button class="nav-btn" onclick="location.href='Explorar.html'" title="Explorar"><span class="nav-btn-glyph">🧭</span><span class="nav-btn-label">Explorar</span></button>
                <button class="nav-btn" onclick="location.href='MisViajes.html'" title="Mis Viajes"><span class="nav-btn-glyph">🧳</span><span class="nav-btn-label">Mis Viajes</span></button>
                <button class="nav-btn active" onclick="location.href='Comunidad.html'" title="Comunidad"><span class="nav-btn-glyph">👥</span><span class="nav-btn-label">Comunidad</span></button>
                <button class="btn-iachat" onclick="location.href='IAChat.html'" title="IA Chat"><span class="nav-btn-glyph">💬</span><span class="nav-btn-label">IA Chat</span></button>
            </nav>
            <div class="header-actions">
                <button class="nav-btn" onclick="location.href='Perfil.html'" title="Perfil"><span class="nav-btn-glyph">👤</span><span class="nav-btn-label">Perfil</span></button>
                <button class="header-logout-btn" id="headerLogout" title="Cerrar sesión">⇥</button>
            </div>

            <button class="hamburger-btn" id="hamburgerBtn" aria-label="Abrir menú">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <!-- OVERLAY + DRAWER -->
    <div class="drawer-overlay" id="drawerOverlay"></div>
    <nav class="sidebar-drawer" id="sidebarDrawer" aria-hidden="true">
        <div class="drawer-header">
            <div class="drawer-logo">
                <div class="logo-icon" style="background-image: url('../Imagenes/Icon_tropicals_T.png');"></div>
                <span class="logo-text">Tropical Travel</span>
            </div>
            <button class="drawer-close" id="drawerClose" aria-label="Cerrar menú">✕</button>
        </div>
        <div class="drawer-body">
            <button class="drawer-nav-item" onclick="location.href='Explorar.html'"><span class="drawer-nav-icon">🧭</span> Explorar</button>
            <button class="drawer-nav-item" onclick="location.href='MisViajes.html'"><span class="drawer-nav-icon">🧳</span> Mis Viajes</button>
            <button class="drawer-nav-item active" onclick="location.href='Comunidad.html'"><span class="drawer-nav-icon">👥</span> Comunidad</button>
            <button class="drawer-nav-item" onclick="location.href='IAChat.html'"><span class="drawer-nav-icon">✦</span> IA Chat</button>
            <div class="drawer-divider"></div>
            <button class="drawer-nav-item" onclick="location.href='Perfil.html'"><span class="drawer-nav-icon">👤</span> Mi Perfil</button>
            <button class="drawer-nav-item drawer-logout" id="drawerLogout"><span class="drawer-nav-icon">⇥</span> Cerrar Sesión</button>
        </div>
    </nav>

    <main class="community-app">
        <aside class="chat-list">
            <div class="chat-list-header">
                <div class="current-user">
                    <div class="avatar small" id="currentUserAvatar">JA</div>
                    <div class="user-actions">
                        <button id="newChatBtn" title="Nuevo chat">＋</button>
                        <button id="newGroupBtn" title="Crear grupo">👥</button>
                        <button id="sidebarOptionsBtn" title="Opciones">⋯</button>
                    </div>
                </div>
                <div class="chat-search">
                    <input type="text" id="chatSearch" placeholder="Busca un chat o inicia uno nuevo" />
                </div>
            </div>
            <div id="chatItems"></div>
            <!-- lista de chats generada por JS -->
        </aside>
        <section class="chat-window">
            <header class="chat-header">
                <div class="chat-title" id="chatTitle">Selecciona un chat</div>
                <div class="chat-actions">
                    <button id="callBtn" title="Llamar">📞</button>
                    <button id="photoBtn" title="Enviar foto">📷</button>
                    <button id="searchBtn" title="Buscar">🔍</button>
                    <button id="menuBtn" title="Menú">⋮</button>
                </div>
            </header>
            <div class="messages" id="messagesContainer">
                <!-- mensajes -->
            </div>
            <footer class="chat-input">
                <button id="emojiBtn">😊</button>
                <input type="text" id="messageInput" placeholder="Escribe un mensaje aquí" autocomplete="off" />
                <button id="sendBtn">➡️</button>
                <button id="micBtn">🎤</button>
            </footer>
        </section>
    </main>

    <input type="file" id="photoInput" accept="image/*" hidden>

    <div class="community-modal" id="addUserModal" aria-hidden="true">
        <div class="community-modal-card">
            <h2>Añadir Usuario</h2>
            <input type="text" id="addUserSearch" class="community-modal-search" placeholder="Buscar por nombre o correo" />
            <div class="community-user-list" id="addUserList"></div>
            <div class="community-modal-actions">
                <button id="closeAddUserModal" class="community-secondary-btn">Cerrar</button>
            </div>
        </div>
    </div>

    <div class="community-modal" id="createGroupModal" aria-hidden="true">
        <div class="community-modal-card">
            <h2>Crear Nuevo Grupo</h2>
            <label for="groupNameInput" class="community-modal-label">Nombre del Grupo</label>
            <input type="text" id="groupNameInput" class="community-modal-search" placeholder="Ej: Exploradores de Selva" />
            <label for="groupMemberSearch" class="community-modal-label">Seleccionar Miembros</label>
            <input type="text" id="groupMemberSearch" class="community-modal-search" placeholder="Buscar miembros" />
            <div class="community-user-list" id="groupUsersList"></div>
            <div class="community-modal-actions two-buttons">
                <button id="cancelCreateGroup" class="community-secondary-btn">Cancelar</button>
                <button id="confirmCreateGroup" class="community-primary-btn">Crear Grupo</button>
            </div>
        </div>
    </div>

    <script src="../Scripts/ScriptsComunidad.js?v=20260407-3" defer></script>

    <nav class="bottom-nav-bar" aria-label="Navegación principal">
        <button class="bottom-nav-item" onclick="location.href='Explorar.html'" title="Explorar"><span class="bnav-icon">🧭</span><span>Explorar</span></button>
        <button class="bottom-nav-item" onclick="location.href='MisViajes.html'" title="Mis Viajes"><span class="bnav-icon">🧳</span><span>Mis Viajes</span></button>
        <button class="bottom-nav-item active" onclick="location.href='Comunidad.html'" title="Comunidad"><span class="bnav-icon">👥</span><span>Comunidad</span></button>
        <button class="bottom-nav-item" onclick="location.href='IAChat.html'" title="IA Chat"><span class="bnav-icon">✦</span><span>IA Chat</span></button>
        <button class="bottom-nav-item" onclick="location.href='Perfil.html'" title="Perfil"><span class="bnav-icon">👤</span><span>Perfil</span></button>
    </nav>
    <script>(function(){var btn=document.getElementById('hamburgerBtn'),ov=document.getElementById('drawerOverlay'),dr=document.getElementById('sidebarDrawer'),cl=document.getElementById('drawerClose');function o(){dr.classList.add('open');ov.classList.add('active');dr.setAttribute('aria-hidden','false');}function c(){dr.classList.remove('open');ov.classList.remove('active');dr.setAttribute('aria-hidden','true');}btn.addEventListener('click',o);ov.addEventListener('click',c);cl.addEventListener('click',c);document.addEventListener('keydown',function(e){if(e.key==='Escape')c();});var lo=document.getElementById('drawerLogout');if(lo)lo.addEventListener('click',function(){localStorage.clear();sessionStorage.clear();location.href='../index.html';});var hl=document.getElementById('headerLogout');if(hl)hl.addEventListener('click',function(){localStorage.clear();sessionStorage.clear();location.href='../index.html';});}());</script>
</body>
</html>
