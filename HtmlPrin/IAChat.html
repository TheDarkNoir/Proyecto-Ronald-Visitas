<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tropical Travel - IA Chat</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../Css/ClienteStyle.css">
    <link rel="stylesheet" href="../Css/IAChat.css">

    <!-- ICONO -->
    <link rel="icon" href="../Imagenes/Icon_tropicals_T.png">
</head>

<body>

<!-- HEADER -->
<header class="top-header">
    <div class="header-container">

        <div class="logo-section" onclick="window.location.href='Inicio.html'">
            <div class="logo-icon" style="background-image: url('../Imagenes/Icon_tropicals_T.png');"></div>
            <span class="logo-text">Tropical Travel</span>
        </div>

        <nav class="top-nav">
            <button class="nav-btn image-button-only" onclick="window.location.href='Explorar.html'" aria-label="Explorar" title="Explorar"><img class="nav-btn-icon" src="../Imagenes/Botones_Iconos/Explorar.png" alt="" aria-hidden="true"></button>
            <button class="nav-btn image-button-only" onclick="window.location.href='MisViajes.html'" aria-label="Mis Viajes" title="Mis Viajes"><img class="nav-btn-icon" src="../Imagenes/Botones_Iconos/MisViajes.png" alt="" aria-hidden="true"></button>
            <button class="nav-btn image-button-only" onclick="window.location.href='Comunidad.html'" aria-label="Comunidad" title="Comunidad"><img class="nav-btn-icon" src="../Imagenes/Botones_Iconos/Comunidad.png" alt="" aria-hidden="true"></button>
            <button class="btn-iachat image-button-only active" aria-label="IA Chat" title="IA Chat"><img class="nav-btn-icon" src="../Imagenes/Botones_Iconos/ChatBot.png" alt="" aria-hidden="true"></button>
        </nav>

        <div class="header-actions">
            <div class="user-avatar" id="userInitials" onclick="window.location.href='Perfil.html'" title="Mi perfil">US</div>
        </div>

    </div>
</header>

<!-- CHAT -->
<section class="chat-section">
    <div class="chat-container">

        <div class="chat-main">

            <!-- BARRA SUPERIOR -->
            <div class="chat-header">
                <span>LawMoon Assistance</span>
            </div>

            <!-- MENSAJES (SIN MENSAJE HARDCODEADO) -->
            <div class="chat-messages" id="chatMessages">
                <!-- VACÍO: el JS pone el mensaje inicial -->
            </div>

            <!-- INPUT -->
            <div class="chat-input-area">

                <input 
                    type="text" 
                    class="chat-input" 
                    id="chatInput"
                    placeholder="Escribe tu mensaje..."
                    autocomplete="off"
                >

                <button class="btn-send" id="sendBtn" type="button">
                    Enviar
                </button>

            </div>

        </div>
    </div>
</section>

<!-- SCRIPTS -->
<script src="../Scripts/ScriptsIAChat.js"></script>

</body>
</html>
