<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tropical Travel - Explorar Destinos</title>
    <link rel="stylesheet" href="../Css/ClienteStyle.css">
    <link rel="icon" href="../Imagenes/Icon_tropicals_T.png" type="image/png">
    <link rel="apple-touch-icon" href="../Imagenes/Icon_tropicals_T.png">
</head>
<body>
    <header class="top-header">
        <div class="header-container">
            <div class="logo-section" style="cursor:pointer;" onclick="location.href='Inicio.html';" title="Volver a Inicio">
                <div class="logo-icon" style="background-image: url('../Imagenes/Icon_tropicals_T.png');"></div>
                <span class="logo-text">Tropical Travel</span>
            </div>
            <nav class="top-nav">
                <button class="nav-btn active" onclick="location.href='Explorar.html'"><img class="nav-btn-icon" src="../Imagenes/Botones_Iconos/Explorar.png" alt="" aria-hidden="true"><span>Explorar</span></button>
                <button class="nav-btn" onclick="location.href='MisViajes.html'"><img class="nav-btn-icon" src="../Imagenes/Botones_Iconos/MisViajes.png" alt="" aria-hidden="true"><span>Mis Viajes</span></button>
                <button class="nav-btn" onclick="location.href='Comunidad.html'"><img class="nav-btn-icon" src="../Imagenes/Botones_Iconos/Comunidad.png" alt="" aria-hidden="true"><span>Comunidad</span></button>
                <button class="btn-iachat" onclick="location.href='IAChat.html'"><img class="nav-btn-icon" src="../Imagenes/Botones_Iconos/ChatBot.png" alt="" aria-hidden="true"><span>IA Chat</span></button>
            </nav>
            <div class="header-actions">
                <div class="notification-wrapper">
                    <button class="notification-btn" id="notificationBtn">🔔</button>
                    <div class="notification-badge" id="notificationBadge">3</div>
                </div>
                <div class="user-avatar" id="userInitials" onclick="location.href='Perfil.html'" title="Mi perfil">TU</div>
            </div>
        </div>
    </header>

    <section class="explorer-section">
        <div class="explorer-content">
            <h1 class="hero-title">Descubre Sitios <span>Magicos</span></h1>
            <p class="hero-subtitle">Explora los destinos mas exoticos y vibrantes. Filtra por tus preferencias y encuentra ofertas exclusivas.</p>

            <div class="explorer-toolbar">
                <div class="search-box">
                    <div class="search-input-wrap">
                        <span class="search-input-icon">🔍</span>
                        <input type="text" class="search-input" id="searchInput" placeholder="Buscar destinos, actividades...">
                    </div>
                    <button class="btn-explore" id="searchButton">Buscar</button>
                </div>

                <div class="quick-filters">
                    <button class="filter-btn" data-filter="todos">Todos</button>
                    <button class="filter-btn" data-filter="playa">Playa</button>
                    <button class="filter-btn" data-filter="aventura">Aventura</button>
                    <button class="filter-btn" data-filter="naturaleza">Naturaleza</button>
                    <button class="filter-btn" data-filter="cultura">Cultura</button>
                </div>
            </div>
        </div>
    </section>

    <section class="destinations-section">
        <div class="section-container">
            <div class="destinations-grid" id="destinationsGrid">
                <!-- Destinos cargados desde scripts -->
            </div>
        </div>
    </section>

    <script src="../Scripts/ScriptsExplorar.js" defer></script>
</body>
</html>
