<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tropical Travel - Explorar Destinos</title>
    <link rel="stylesheet" href="../Css/ClienteStyle.css">
    <link rel="icon" href="../Imagenes/Icon_tropicals_T.png" type="image/png">
    <link rel="apple-touch-icon" href="../Imagenes/Icon_tropicals_T.png">
</head>
<body>
    <header class="top-header">
        <div class="header-container">
            <div class="logo-section" style="cursor:pointer;" onclick="location.href='Inicio.html';" title="Volver a Inicio">
                <div class="logo-icon" style="background-image: url('../Imagenes/Icon_tropicals_T.png');"></div>
                <span class="logo-text">Tropical Travel</span>
            </div>
            <nav class="top-nav">
                <button class="nav-btn active" onclick="location.href='Explorar.html'">🧭 Explorar</button>
                <button class="nav-btn" onclick="location.href='MisViajes.html'">📅 Mis Viajes</button>
                <button class="nav-btn" onclick="location.href='Comunidad.html'">👥 Comunidad</button>
                <button class="btn-iachat" onclick="location.href='IAChat.html'">💬 IA Chat</button>
            </nav>
            <div class="header-actions">
                <div class="notification-wrapper">
                    <button class="notification-btn" id="notificationBtn">🔔</button>
                    <div class="notification-badge" id="notificationBadge">3</div>
                </div>
                <div class="user-avatar" id="userInitials" onclick="location.href='Perfil.html'" title="Mi perfil">TU</div>
            </div>
        </div>
    </header>

    <section class="explorer-section">
        <div class="explorer-content">
            <h1 class="hero-title">Encuentra tu próximo destino</h1>
            <p class="hero-subtitle">Busca por ciudad, país o experiencia y descubre paquetes ideales para ti.</p>

            <div class="search-box">
                <div style="position:relative;flex:1;">
                    <span class="search-input-icon">🔍</span>
                    <input type="text" class="search-input" id="searchInput" placeholder="Buscar destino (e.g., Bogotá, Mar, Montaña)">
                </div>
                <button class="btn-explore" id="searchButton">Buscar</button>
            </div>

            <div class="quick-filters" style="margin-top:1rem; display:flex; gap:.5rem; flex-wrap:wrap;">
                <button class="filter-btn" data-filter="todos">Todos</button>
                <button class="filter-btn" data-filter="playa">Playa</button>
                <button class="filter-btn" data-filter="aventura">Aventura</button>
                <button class="filter-btn" data-filter="naturaleza">Naturaleza</button>
                <button class="filter-btn" data-filter="cultura">Cultura</button>
            </div>
        </div>
    </section>

    <section class="destinations-section">
        <div class="section-container">
            <div class="destinations-grid" id="destinationsGrid">
                <!-- Destinos cargados desde scripts -->
            </div>
        </div>
    </section>

    <script>
        (function () {
            const lu = JSON.parse(localStorage.getItem('loggedUser') || 'null');
            if (!lu) { window.location.href = '../index.html'; return; }
            const initials = (lu.username || lu.email || 'U').split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
            document.getElementById('userInitials').textContent = initials;
        })();

        let destinations = [];

        function renderDestinos(list) {
            const container = document.getElementById('destinationsGrid');
            container.innerHTML = '';
            if (!list.length) {
                container.innerHTML = '<p style="padding:2rem; text-align:center; color:#888;">No encontramos destinos para los criterios de búsqueda.</p>';
                return;
            }
            list.forEach(d => {
                const card = document.createElement('div');
                card.className = 'destination-card';
                const desc = d.description || '';
                const shortDesc = desc.length > 90 ? desc.slice(0, 90) + '...' : desc;
                const priceText = d.price > 0 ? '$' + Number(d.price).toLocaleString('es-CO') + ' COP' : 'Consultar precio';
                const cardHtml = '<div class="card-image" style="background-image: url(\'' + d.image + '\');">'
                    + '<div class="card-rating">&#11088; ' + (d.rating || '4.5') + '</div>'
                    + '<div class="difficulty-badge">' + (d.difficulty || '') + '</div>'
                    + '<div class="duration-badge">' + (d.duration || '') + '</div>'
                    + '</div>'
                    + '<div class="card-content">'
                    + '<h3 class="card-title">' + d.title + '</h3>'
                    + '<p class="card-location">&#128205; ' + d.location + '</p>'
                    + '<p style="font-size:.85rem;color:#666;margin:.3rem 0 .6rem;">' + shortDesc + '</p>'
                    + '<div class="card-footer">'
                    + '<div class="card-price">' + priceText + '</div>'
                    + '<button class="card-btn" data-id="' + d.id + '">Reservar &#8594;</button>'
                    + '</div>'
                    + '</div>';
                card.innerHTML = cardHtml;
                container.appendChild(card);
            });
        }

        function applyFilter(token, activeBtn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            if (activeBtn) activeBtn.classList.add('active');
            if (!destinations.length) return;
            const filtered = token === 'todos'
                ? destinations
                : destinations.filter(d => (d.categoria || '').toLowerCase() === token);
            renderDestinos(filtered);
        }

        async function loadDestinos() {
            try {
                const resp = await fetch('/destinos');
                if (!resp.ok) throw new Error('No se pudo cargar destinos');
                destinations = await resp.json();
                const todosBtn = document.querySelector('.filter-btn[data-filter="todos"]');
                if (todosBtn) todosBtn.classList.add('active');
                renderDestinos(destinations);
            } catch (err) {
                console.error('Error al cargar destinos:', err);
                document.getElementById('destinationsGrid').innerHTML = '<p style="padding:1rem; text-align:center;">Error al cargar destinos desde el servidor.</p>';
            }
        }

        document.getElementById('searchButton').addEventListener('click', () => {
            const q = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!q) { renderDestinos(destinations); return; }
            const result = destinations.filter(d => {
                const title = (d.title || '').toLowerCase();
                const location = (d.location || '').toLowerCase();
                const cat = (d.categoria || '').toLowerCase();
                const desc = (d.description || '').toLowerCase();
                return title.includes(q) || location.includes(q) || cat.includes(q) || desc.includes(q);
            });
            renderDestinos(result);
        });

        document.getElementById('searchInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('searchButton').click();
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => applyFilter(btn.dataset.filter, btn));
        });

        loadDestinos();
    </script>
</body>
</html>
